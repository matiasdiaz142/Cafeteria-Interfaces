<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Café Aurora - Contacto</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

  <header class="bg-brown p-3 text-light">
    <div class="container d-flex align-items-center justify-content-between">
      <h1 class="h4 d-flex align-items-center">
        <img src="img/logo.png" alt="Logo" class="logo me-2">
        Contactos
      </h1>
      <nav>
        <ul class="nav">
          <li class="nav-item"><a class="nav-link text-light" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="menu.html">Menú</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container my-5">
    <h2>Contacto</h2>
    <form id="formContacto">
      <label for="nombre" class="form-label mt-1">Nombre:</label>
      <input type="text" class="form-control" id="nombre">

      <label for="email" class="form-label mt-3">Email:</label>
      <input type="email" class="form-control" id="email">

      <label for="mensaje" class="form-label mt-3">Mensaje:</label>
      <textarea class="form-control" id="mensaje"></textarea>

      <button type="submit" id="btnEnviar" class="btn btn-dark mt-3">Enviar</button>
    </form>
  </main>

  <script src="js/contacto.js"></script>
</body>

</html>
