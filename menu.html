<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Café Aurora - Menú</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

  <header class="bg-brown p-3 text-light">
    <div class="container d-flex align-items-center justify-content-between">
      <h1 class="h4 d-flex align-items-center">
        <img src="img/logo.png" alt="Logo" class="logo me-2">
        Menu Productos
      </h1>
      <nav>
        <ul class="nav">
          <li class="nav-item"><a class="nav-link text-light" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="menu.html">Menú</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>


  <main class="container my-4">

    <h2>Lista Productos</h2>

    <section id="filtroProductos" class="mb-3">
      <input type="text" id="filtro" placeholder="Buscar producto..." class="form-control">
    </section>

    <section id="listaProductos" class="mb-3">
      <ul id="productos">

      </ul>
    </section>

    <button id="btnAgregar" class="btn btn-dark mt-3 mb-3">Agregar Producto</button>

    <section id="seccionAgregar" style="display: none;">
      <input type="text" class="form-control mt-3" id="nuevoNombre" placeholder="Nombre del producto">
      <input type="text" class="form-control mt-3" id="nuevoPrecio" placeholder="Precio">
      <button id="btnGuardarNuevo" class="btn btn-dark mt-3 mb-3">Guardar</button>
    </section>

    <p>Productos seleccionados: <span id="contadorSeleccionados">0</span></p>

    <section id="recomendaciones" class="mb-3">
      <h2>Recomendaciones</h2>
    </section>

  </main>

  <script src="js/menu.js"></script>
</body>

</html>
